<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crew Board</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; background: #F7F4EC; background-image: linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px); background-size: 28px 28px; }
    .stat-btn {
      backdrop-filter: blur(6px);
      background: rgba(255,253,245,0.92) !important;
    }
    .stat-btn:hover { background: rgba(255,253,248,0.97) !important; }
    .request-card {
      backdrop-filter: blur(4px);
    }
    #bg-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
    #root { position: relative; z-index: 1; }
    .cb-input, .cb-textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      border: 1px solid rgba(180,160,100,0.35);
      background: rgba(255,253,248,0.94);
      color: #1B2A33;
      border-radius: 3px;
      padding: 10px 12px;
      width: 100%;
      -webkit-appearance: none;
    }
    .cb-input:focus, .cb-textarea:focus { outline: 2px solid #D97706; outline-offset: 1px; }
    .cb-btn {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
      border-radius: 3px; border: 1px solid #1B2A33; background: #1B2A33;
      color: #F7F4EC; padding: 11px 18px; cursor: pointer; white-space: nowrap;
    }
    .cb-btn:hover { background: #2A3F4C; }
    .cb-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .cb-btn-ghost {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
      background: transparent; color: #1B2A33; border: 1px solid #B9B3A0;
      border-radius: 3px; padding: 11px 18px; cursor: pointer; white-space: nowrap;
    }
    .cb-btn-ghost:hover { background: #EDE9DC; }
    .cb-btn-danger {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
      background: transparent; color: #9A3C3C; border: 1px solid #C98787;
      border-radius: 3px; padding: 11px 18px; cursor: pointer; white-space: nowrap;
    }
    .cb-btn-danger:hover { background: #F6E8E8; }
    .cb-btn-approve {
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px;
      background: #3E6F5C; color: #fff; border: 1px solid #3E6F5C;
      border-radius: 3px; padding: 8px 14px; cursor: pointer;
    }
    .cb-btn-approve:hover { background: #2E5243; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(27,42,51,0.55);
      display: flex; align-items: flex-start; justify-content: center;
      z-index: 100; padding: 16px; overflow-y: auto;
    }
    .modal-box {
      background: rgba(255,253,248,0.97); border: 1px solid rgba(180,160,100,0.4); border-radius: 6px;
      padding: 24px; width: 100%; max-width: 480px; margin: auto;
      backdrop-filter: blur(8px);
    }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1B2A33; color: #F7F4EC; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; padding: 10px 18px; border-radius: 4px; z-index: 200;
      white-space: nowrap; animation: fadeIn 0.2s ease;
    }
    .toast.error { background: #7A3B3B; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .roster-card {
      background: rgba(255,253,248,0.94); border: 1px solid rgba(180,160,100,0.4); border-radius: 3px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
      backdrop-filter: blur(4px);
    }
    @media (min-width: 700px) {
      .roster-card { display: grid; grid-template-columns: 1.3fr 1.4fr auto auto; gap: 16px; align-items: center; }
    }
    .card-actions { display: flex; gap: 8px; }
    .card-actions button { flex: 1; }
    @media (min-width: 700px) { .card-actions button { flex: unset; } }
    .form-row-2 { display: grid; grid-template-columns: 1fr; gap: 13px; }
    @media (min-width: 480px) { .form-row-2 { grid-template-columns: 1fr 1fr; } }
    .search-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; align-items: center; }
    .search-bar input { flex: 1; min-width: 160px; }
    .board-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 20px; border-bottom: 2px solid #1B2A33; padding-bottom: 14px; gap: 12px;
    }
    .request-card {
      background: #FFFEFA; border: 1px solid #D8D2BF; border-left: 4px solid #C9821F;
      border-radius: 3px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
    }
    @media (min-width: 600px) { .request-card { flex-direction: row; align-items: center; justify-content: space-between; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const SUPABASE_URL = "https://omlgxlecijdvczbnteai.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tbGd4bGVjaWpkdmN6Ym50ZWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDk1NjMsImV4cCI6MjA5ODQyNTU2M30.SODHGjbOaixxfdLIdDMMqSxkdI3GgjK8Tlrz9d8zU6I";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function daysUntil(dateStr) {
      if (!dateStr) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      return Math.round((new Date(dateStr + "T00:00:00") - today) / 86400000);
    }

    function deriveStatus(p) {
      const onVacation = p.vacation_start && p.vacation_end &&
        new Date() >= new Date(p.vacation_start + "T00:00:00") &&
        new Date() <= new Date(p.vacation_end + "T23:59:59");
      if (onVacation) return "vacation";
      if (!p.current_project || p.current_project.toLowerCase() === "unassigned") return "available";
      const du = daysUntil(p.project_end);
      if (du !== null && du <= 14) return "transitioning";
      return "active";
    }

    const STATUS_META = {
      active:        { label: "On project",  stamp: "ACTIVE",     color: "#3E6F5C", bg: "#E4EEE7", border: "#3E6F5C" },
      transitioning: { label: "Wrapping up", stamp: "TRANSITION", color: "#A4621A", bg: "#F6E9D6", border: "#C9821F" },
      available:     { label: "Available",   stamp: "AVAILABLE",  color: "#1F4E78", bg: "#E1E9F0", border: "#2E6394" },
      vacation:      { label: "On vacation", stamp: "ON LEAVE",   color: "#7A3B3B", bg: "#F2E1E1", border: "#A14E4E" },
    };

    function fmt(d) {
      if (!d) return "—";
      return new Date(d + "T00:00:00").toLocaleDateString("en-CA", { month: "short", day: "numeric", year: "numeric" });
    }

    function PasswordField({ label, value, onChange, placeholder, onKeyDown }) {
      const [show, setShow] = React.useState(false);
      const [capsOn, setCapsOn] = React.useState(false);
      return (
        <label style={{ display: "block" }}>
          <div style={{ fontSize: 11, color: "#7A7461", marginBottom: 5, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em" }}>
            {label.toUpperCase()}
          </div>
          <div style={{ position: "relative" }}>
            <input
              className="cb-input"
              type={show ? "text" : "password"}
              value={value}
              onChange={onChange}
              placeholder={placeholder || "••••••••"}
              onKeyDown={onKeyDown}
              onKeyUp={e => setCapsOn(e.getModifierState("CapsLock"))}
              onFocus={e => setCapsOn(e.getModifierState("CapsLock"))}
              style={{ paddingRight: 40 }}
            />
            <button
              type="button"
              onClick={() => setShow(!show)}
              style={{
                position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
                background: "none", border: "none", cursor: "pointer", fontSize: 15, color: "#8A8270", padding: 0,
              }}>
              {show ? "🙈" : "👁"}
            </button>
          </div>
          {capsOn && (
            <div style={{ fontSize: 11, color: "#A4621A", marginTop: 4, fontFamily: "'Inter', sans-serif" }}>
              ⚠ Caps Lock is on
            </div>
          )}
        </label>
      );
    }

    function Field({ label, children }) {
      return (
        <label style={{ display: "block" }}>
          <div style={{ fontSize: 11, color: "#7A7461", marginBottom: 5, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em" }}>
            {label.toUpperCase()}
          </div>
          {children}
        </label>
      );
    }

    // ── Login Screen ──────────────────────────────────────────────────────────
    const OWNER_EMAIL = "goldytraju@gmail.com";

    // Email notifications disabled until a server-side function is configured
    async function sendEmail(to, subject, html) {
      console.log("Email notification (not sent — server-side function needed):", { to, subject });
    }

    // ── Login Screen ──────────────────────────────────────────────────────────
    function LoginScreen({ onSwitchToSignup }) {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);
      const [view, setView] = useState("login");

      async function handleLogin() {
        setLoading(true); setMessage(null);
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { setMessage({ text: error.message, type: "error" }); setLoading(false); }
      }

      async function handleForgot() {
        if (!email) { setMessage({ text: "Enter your email address above first.", type: "error" }); return; }
        setLoading(true); setMessage(null);
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: "https://thomaskanata-crew-board.netlify.app/",
        });
        if (error) { setMessage({ text: error.message, type: "error" }); }
        else { setMessage({ text: "Password reset email sent — check your inbox.", type: "ok" }); setView("login"); }
        setLoading(false);
      }

      return (
        <div style={{
          minHeight: "100vh", background: "#F7F4EC", backgroundImage: "linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px)", backgroundSize: "28px 28px", display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        }}>
          <div style={{ background: "rgba(255,254,250,0.96)", border: "1px solid rgba(200,190,170,0.5)", borderRadius: 6, padding: 32, width: "100%", maxWidth: 380 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "#6B6354", marginBottom: 4 }}>
              REGISTER — CREW DEPLOYMENT
            </div>
            <h1 style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 26, textTransform: "uppercase", marginBottom: 24 }}>
              Crew Board
            </h1>

            {view === "login" ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Field label="Email">
                  <input className="cb-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" />
                </Field>
                <PasswordField label="Password" value={password} onChange={e => setPassword(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleLogin()} />
                {message && (
                  <div style={{ fontSize: 12, color: message.type === "ok" ? "#3E6F5C" : "#9A3C3C", background: message.type === "ok" ? "#E4EEE7" : "#F6E8E8", padding: "8px 12px", borderRadius: 3 }}>
                    {message.text}
                  </div>
                )}
                <button className="cb-btn" disabled={!email || !password || loading} onClick={handleLogin}>
                  {loading ? "Signing in…" : "Sign in"}
                </button>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                  <button onClick={() => { setView("forgot"); setMessage(null); }} style={{
                    background: "none", border: "none", cursor: "pointer", fontSize: 12,
                    color: "#6B6354", textDecoration: "underline", fontFamily: "'Inter', sans-serif",
                  }}>Forgot password?</button>
                  <button onClick={onSwitchToSignup} style={{
                    background: "none", border: "none", cursor: "pointer", fontSize: 12,
                    color: "#1F4E78", textDecoration: "underline", fontFamily: "'Inter', sans-serif", fontWeight: 600,
                  }}>Request access →</button>
                </div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <div style={{ fontSize: 13, color: "#5A5444", marginBottom: 4 }}>
                  Enter your email and we will send you a link to reset your password.
                </div>
                <Field label="Email">
                  <input className="cb-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" />
                </Field>
                {message && (
                  <div style={{ fontSize: 12, color: message.type === "ok" ? "#3E6F5C" : "#9A3C3C", background: message.type === "ok" ? "#E4EEE7" : "#F6E8E8", padding: "8px 12px", borderRadius: 3 }}>
                    {message.text}
                  </div>
                )}
                <button className="cb-btn" disabled={!email || loading} onClick={handleForgot}>
                  {loading ? "Sending…" : "Send reset email"}
                </button>
                <button onClick={() => { setView("login"); setMessage(null); }} style={{
                  background: "none", border: "none", cursor: "pointer", fontSize: 12,
                  color: "#6B6354", textDecoration: "underline", fontFamily: "'Inter', sans-serif", textAlign: "center",
                }}>← Back to sign in</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Sign Up Screen ────────────────────────────────────────────────────────
    function SignupScreen({ onSwitchToLogin }) {
      const [firstName, setFirstName] = useState("");
      const [lastName, setLastName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [confirm, setConfirm] = useState("");
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);

      async function handleSignup() {
        if (password !== confirm) { setMessage({ text: "Passwords do not match.", type: "error" }); return; }
        if (password.length < 6) { setMessage({ text: "Password must be at least 6 characters.", type: "error" }); return; }
        if (!firstName.trim() || !lastName.trim()) { setMessage({ text: "Please enter your full name.", type: "error" }); return; }
        setLoading(true); setMessage(null);
        const fullName = `${firstName.trim()} ${lastName.trim()}`;
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) { setMessage({ text: error.message, type: "error" }); setLoading(false); return; }
        if (data?.user) {
          await sb.from("user_roles").insert({
            user_id: data.user.id, email: data.user.email,
            full_name: fullName, role: "member", status: "pending",
          });
          // Notify owner
          await sendEmail(OWNER_EMAIL, "New Access Request — Crew Board",
            `<p><strong>${fullName}</strong> (${email}) has requested access to the Crew Board.</p><p><a href="https://thomaskanata-crew-board.netlify.app/">Log in to approve or reject</a></p>`
          );
        }
        setMessage({ text: "Request submitted — an Admin will approve your access shortly.", type: "ok" });
        setLoading(false);
      }

      return (
        <div style={{
          minHeight: "100vh", background: "#F7F4EC", backgroundImage: "linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px)", backgroundSize: "28px 28px", display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        }}>
          <div style={{ background: "rgba(255,254,250,0.96)", border: "1px solid rgba(200,190,170,0.5)", borderRadius: 6, padding: 32, width: "100%", maxWidth: 420 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "#6B6354", marginBottom: 4 }}>
              REGISTER — CREW DEPLOYMENT
            </div>
            <h1 style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 26, textTransform: "uppercase", marginBottom: 6 }}>
              Request Access
            </h1>
            <div style={{ fontSize: 13, color: "#6B6354", marginBottom: 20 }}>
              Fill in your details below. An Admin will review and approve your request.
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div className="form-row-2">
                <Field label="First name">
                  <input className="cb-input" value={firstName} onChange={e => setFirstName(e.target.value)} placeholder="John" />
                </Field>
                <Field label="Last name">
                  <input className="cb-input" value={lastName} onChange={e => setLastName(e.target.value)} placeholder="Smith" />
                </Field>
              </div>
              <Field label="Email">
                <input className="cb-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" />
              </Field>
              <PasswordField label="Password" value={password} onChange={e => setPassword(e.target.value)} />
              <PasswordField label="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleSignup()} />
              {message && (
                <div style={{ fontSize: 12, color: message.type === "ok" ? "#3E6F5C" : "#9A3C3C", background: message.type === "ok" ? "#E4EEE7" : "#F6E8E8", padding: "10px 12px", borderRadius: 3, lineHeight: 1.5 }}>
                  {message.text}
                </div>
              )}
              {message?.type !== "ok" ? (
                <button className="cb-btn" disabled={!firstName || !lastName || !email || !password || !confirm || loading} onClick={handleSignup}>
                  {loading ? "Submitting…" : "Submit request"}
                </button>
              ) : (
                <button className="cb-btn-ghost" onClick={onSwitchToLogin}>← Back to sign in</button>
              )}
              <button onClick={onSwitchToLogin} style={{
                background: "none", border: "none", cursor: "pointer", fontSize: 12,
                color: "#6B6354", textDecoration: "underline", fontFamily: "'Inter', sans-serif", textAlign: "center",
              }}>← Back to sign in</button>
            </div>
          </div>
        </div>
      );
    }
    // ── Person Form ───────────────────────────────────────────────────────────
    function PersonForm({ person, onCancel, onSave, saving, isViewer }) {
      const blank = { name: "", position: "", trade: "", current_project: "", project_end: "", next_project: "", vacation_start: "", vacation_end: "", comments: "" };
      const [form, setForm] = useState(person ? { ...blank, ...person } : blank);
      const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });

      return (
        <div className="modal-box">
          <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 18, textTransform: "uppercase", marginBottom: 18, borderBottom: "1px solid #E3DFD1", paddingBottom: 12 }}>
            {form.id ? (isViewer ? "Request edit" : "Edit entry") : (isViewer ? "Request new person" : "Add person")}
          </div>
          {isViewer && (
            <div style={{ fontSize: 12, background: "#F6E9D6", border: "1px solid #C9821F", borderRadius: 3, padding: "8px 12px", marginBottom: 14, color: "#A4621A" }}>
              Your changes will be sent to an Admin for approval.
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Field label="Name">
              <input className="cb-input" value={form.name} onChange={set("name")} placeholder="Full name" />
            </Field>
            <Field label="Position / Role">
              <input className="cb-input" value={form.position || ""} onChange={set("position")} placeholder="e.g. Lead Pipefitter, Superintendent" />
            </Field>
            <Field label="Trade">
              <input className="cb-input" value={form.trade || ""} onChange={set("trade")} placeholder="e.g. Scaffolding, Insulation, Pipefitting" />
            </Field>
            <div className="form-row-2">
              <Field label="Current project">
                <input className="cb-input" value={form.current_project || ""} onChange={set("current_project")} placeholder="e.g. Dry Creek WTP" />
              </Field>
              <Field label="Project end date">
                <input className="cb-input" type="date" value={form.project_end || ""} onChange={set("project_end")} />
              </Field>
            </div>
            <Field label="Next project">
              <input className="cb-input" value={form.next_project || ""} onChange={set("next_project")} placeholder="e.g. LNG Canada, or TBD" />
            </Field>
            <div className="form-row-2">
              <Field label="Vacation start">
                <input className="cb-input" type="date" value={form.vacation_start || ""} onChange={set("vacation_start")} />
              </Field>
              <Field label="Vacation end">
                <input className="cb-input" type="date" value={form.vacation_end || ""} onChange={set("vacation_end")} />
              </Field>
            </div>
            <Field label="Comments">
              <textarea className="cb-textarea" rows={3} value={form.comments || ""} onChange={set("comments")} placeholder="Notes, confirmation status, etc." />
            </Field>
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 20 }}>
            <button className="cb-btn-ghost" onClick={onCancel} disabled={saving}>Cancel</button>
            <button className="cb-btn" disabled={!form.name.trim() || saving} onClick={() => form.name.trim() && onSave(form)}>
              {saving ? "Submitting…" : isViewer ? "Submit request" : "Save entry"}
            </button>
          </div>
        </div>
      );
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function Toast({ message, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
      return <div className={`toast${type === "error" ? " error" : ""}`}>{message}</div>;
    }

    // ── Requests Panel (editor only) ──────────────────────────────────────────
    const FIELD_LABELS = {
      name: "Name", position: "Position", trade: "Trade", current_project: "Current project",
      project_end: "Project end", next_project: "Next project",
      vacation_start: "Vacation start", vacation_end: "Vacation end", comments: "Comments",
    };

    function DiffRow({ label, current, requested }) {
      const changed = (current || "") !== (requested || "") && requested;
      return (
        <div style={{
          display: "grid", gridTemplateColumns: "100px 1fr 1fr", gap: 8,
          fontSize: 12, padding: "5px 0", borderBottom: "1px solid #EDE9DC",
        }}>
          <div style={{ color: "#8A8270", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{label}</div>
          <div style={{ color: "#5A5444" }}>{current || <span style={{ color: "#C9C2AC" }}>—</span>}</div>
          <div style={{
            color: changed ? "#A4621A" : "#5A5444",
            background: changed ? "#FDF3E3" : "transparent",
            borderRadius: 3, padding: changed ? "1px 6px" : 0,
            fontWeight: changed ? 600 : 400,
            border: changed ? "1px solid #C9821F" : "none",
          }}>
            {requested || <span style={{ color: "#C9C2AC" }}>—</span>}
          </div>
        </div>
      );
    }

    function RequestsPanel({ requests, roster, onApprove, onReject }) {
      if (requests.length === 0) return null;
      return (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 16, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
            Pending Requests
            <span style={{ background: "#C9821F", color: "#fff", borderRadius: 99, fontSize: 11, fontFamily: "'Inter', sans-serif", padding: "2px 8px" }}>
              {requests.length}
            </span>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {requests.map(r => {
              const payload = JSON.parse(r.payload);
              const current = roster.find(p => p.id === r.roster_id) || {};
              const fields = ["name","position","current_project","project_end","next_project","vacation_start","vacation_end","comments"];
              return (
                <div key={r.id} style={{
                  background: "#FFFEFA", border: "1px solid #D8D2BF",
                  borderLeft: "4px solid #C9821F", borderRadius: 3, padding: "14px 16px",
                }}>
                  {/* Header */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>
                        {r.action === "add" ? "➕ Add" : r.action === "edit" ? "✏️ Edit" : "🗑 Remove"} — {payload.name}
                      </div>
                      <div style={{ fontSize: 12, color: "#7A7461", marginTop: 2 }}>
                        Requested by <strong>{r.requester_full_name || r.requester_email}</strong>
                        {r.requester_full_name && <div style={{ fontSize: 11, color: "#9A9381", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>{r.requester_email}</div>}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button className="cb-btn-approve" onClick={() => onApprove(r)}>Approve</button>
                      <button className="cb-btn-danger" style={{ padding: "8px 14px", fontSize: 13 }} onClick={() => onReject(r.id, r)}>Reject</button>
                    </div>
                  </div>

                  {/* Remove action */}
                  {r.action === "remove" && (
                    <div style={{ fontSize: 12, color: "#9A3C3C", background: "#F6E8E8", padding: "8px 12px", borderRadius: 3 }}>
                      This request will permanently remove <strong>{payload.name}</strong> from the board.
                    </div>
                  )}

                  {/* Add action — just show all fields */}
                  {r.action === "add" && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                      {fields.filter(f => payload[f]).map(f => (
                        <div key={f} style={{ display: "grid", gridTemplateColumns: "100px 1fr", gap: 8, fontSize: 12, padding: "5px 0", borderBottom: "1px solid #EDE9DC" }}>
                          <div style={{ color: "#8A8270", fontFamily: "'JetBrains Mono', monospace", fontSize: 11 }}>{FIELD_LABELS[f]}</div>
                          <div style={{ color: "#3E6F5C", fontWeight: 500 }}>{payload[f]}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Edit action — side by side diff */}
                  {r.action === "edit" && (
                    <div>
                      <div style={{ display: "grid", gridTemplateColumns: "100px 1fr 1fr", gap: 8, marginBottom: 4 }}>
                        <div></div>
                        <div style={{ fontSize: 11, color: "#8A8270", fontFamily: "'JetBrains Mono', monospace" }}>CURRENT</div>
                        <div style={{ fontSize: 11, color: "#A4621A", fontFamily: "'JetBrains Mono', monospace" }}>REQUESTED</div>
                      </div>
                      {fields.map(f => {
                        const cur = current[f] || "";
                        const req = payload[f] || "";
                        if (!cur && !req) return null;
                        return <DiffRow key={f} label={FIELD_LABELS[f]} current={cur} requested={req} />;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── Main Board ────────────────────────────────────────────────────────────
    function CrewBoard({ user, role }) {
      const isOwner = role === "owner";
      const isAdmin = role === "admin" || role === "owner";
      const isEditor = isAdmin; // keep backward compat
      const [fullName, setFullName] = useState("");
      const [roster, setRoster] = useState([]);
      const [requests, setRequests] = useState([]);
      const [pendingUsers, setPendingUsers] = useState([]);
      const [allUsers, setAllUsers] = useState([]);
      const [showUsers, setShowUsers] = useState(false);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [query, setQuery] = useState("");
      const [filter, setFilter] = useState("all");
      const [positionFilter, setPositionFilter] = useState("all");
      const [tradeFilter, setTradeFilter] = useState("all");
      const [editing, setEditing] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [toast, setToast] = useState(null);

      const notify = (message, type = "ok") => setToast({ message, type });

      const load = useCallback(async () => {
        const { data } = await sb.from("roster").select("*").order("name");
        setRoster(data || []);
        if (!fullName) {
          const { data: ur } = await sb.from("user_roles").select("full_name").eq("user_id", user.id).single();
          if (ur?.full_name) setFullName(ur.full_name);
        }
        if (isAdmin) {
          const { data: reqs } = await sb.from("requests").select("*").eq("status", "pending").order("created_at");
          setRequests(reqs || []);
          const { data: pending } = await sb.from("user_roles").select("*").eq("status", "pending");
          setPendingUsers(pending || []);
          const { data: all } = await sb.from("user_roles").select("*").order("full_name");
          setAllUsers(all || []);
        }
        setLoading(false);
      }, [isAdmin]);

      useEffect(() => { load(); }, [isAdmin]);

      useEffect(() => {
        const channel = sb.channel("roster-changes")
          .on("postgres_changes", { event: "*", schema: "public", table: "roster" }, () => load())
          .on("postgres_changes", { event: "*", schema: "public", table: "requests" }, () => load())
          .on("postgres_changes", { event: "*", schema: "public", table: "user_roles" }, () => load())
          .subscribe();
        // Polling fallback every 15 seconds in case real-time misses events
        const poll = setInterval(() => load(), 15000);
        return () => { sb.removeChannel(channel); clearInterval(poll); };
      }, [isAdmin]);

      const withStatus = useMemo(() => roster.map(p => ({ ...p, status: deriveStatus(p) })), [roster]);

      const counts = useMemo(() => {
        const c = { active: 0, transitioning: 0, available: 0, vacation: 0 };
        withStatus.forEach(p => c[p.status]++);
        return c;
      }, [withStatus]);

      const positions = useMemo(() => {
        const set = new Set(withStatus.map(p => p.position).filter(Boolean));
        return Array.from(set).sort();
      }, [withStatus]);

      const trades = useMemo(() => {
        const set = new Set(withStatus.map(p => p.trade).filter(Boolean));
        return Array.from(set).sort();
      }, [withStatus]);

      const filtered = useMemo(() => withStatus
        .filter(p => filter === "all" ? true : p.status === filter)
        .filter(p => positionFilter === "all" ? true : (p.position || "") === positionFilter)
        .filter(p => tradeFilter === "all" ? true : (p.trade || "") === tradeFilter)
        .filter(p => {
          const q = query.trim().toLowerCase();
          if (!q) return true;
          return p.name.toLowerCase().includes(q) ||
            (p.current_project || "").toLowerCase().includes(q) ||
            (p.next_project || "").toLowerCase().includes(q) ||
            (p.position || "").toLowerCase().includes(q) ||
            (p.trade || "").toLowerCase().includes(q);
        }), [withStatus, filter, positionFilter, query]);

      // Editor: save directly
      async function editorSave(form) {
        setSaving(true);
        const payload = {
          name: form.name, position: form.position || null,
          trade: form.trade || null,
          current_project: form.current_project || null,
          project_end: form.project_end || null, next_project: form.next_project || null,
          vacation_start: form.vacation_start || null, vacation_end: form.vacation_end || null,
          comments: form.comments || null,
        };
        let error;
        if (form.id) ({ error } = await sb.from("roster").update(payload).eq("id", form.id));
        else ({ error } = await sb.from("roster").insert(payload));
        setSaving(false);
        if (error) notify("Save failed: " + error.message, "error");
        else { setEditing(null); notify(form.id ? "Entry updated" : "Person added"); load(); }
      }

      // Editor: remove directly
      async function editorRemove(id) {
        const { error } = await sb.from("roster").delete().eq("id", id);
        setConfirmDelete(null);
        if (error) notify("Remove failed: " + error.message, "error");
        else { notify("Removed from board"); load(); }
      }

      // Viewer: submit request
      async function viewerRequest(form, action) {
        setSaving(true);
        const { error } = await sb.from("requests").insert({
          requester_id: user.id,
          requester_email: user.email,
          requester_full_name: fullName || null,
          action,
          payload: JSON.stringify(form),
          status: "pending",
          roster_id: form.id || null,
        });
        setSaving(false);
        if (error) notify("Request failed: " + error.message, "error");
        else { setEditing(null); setConfirmDelete(null); notify("Request submitted for approval"); }
      }

      // Editor: approve request
      async function approveUser(u, newRole) {
        const { error } = await sb.from("user_roles").update({ status: "approved", role: newRole }).eq("user_id", u.user_id);
        if (error) { notify("Failed to approve user", "error"); return; }
        notify(`${u.email} approved as ${newRole === "admin" ? "Admin" : "Member"}`);
        await sendEmail(u.email, "You have been approved — Crew Board",
          `<p>Hi ${u.full_name || "there"},</p><p>Your access to the <strong>Crew Board</strong> has been approved. You can now sign in as a <strong>${newRole === "admin" ? "Admin" : "Member"}</strong>.</p><p><a href="https://thomaskanata-crew-board.netlify.app/">Sign in here</a></p>`
        );
        load();
      }

      async function rejectUser(u) {
        const { error } = await sb.from("user_roles").update({ status: "rejected" }).eq("user_id", u.user_id);
        if (error) { notify("Failed to reject user", "error"); return; }
        notify("User rejected");
        await sendEmail(u.email, "Access Request Update — Crew Board",
          `<p>Hi ${u.full_name || "there"},</p><p>Unfortunately your request to access the <strong>Crew Board</strong> has not been approved at this time. Please contact your manager for more information.</p>`
        );
        load();
      }

      async function promoteUser(u) {
        const { error } = await sb.from("user_roles").update({ role: "admin" }).eq("user_id", u.user_id);
        if (error) notify("Failed to promote user", "error");
        else { notify(`${u.email} promoted to Admin`); load(); }
      }

      async function changeUserStatus(u, newStatus, newRole) {
        const update = { status: newStatus };
        if (newRole) update.role = newRole;
        const { error } = await sb.from("user_roles").update(update).eq("user_id", u.user_id);
        if (error) notify("Failed to update user", "error");
        else { notify(`${u.full_name || u.email} updated to ${newRole || newStatus}`); load(); }
      }

      async function notifyRequestResult(req, approved) {
        const payload = JSON.parse(req.payload);
        const { data: userRole } = await sb.from("user_roles").select("email, full_name").eq("user_id", req.requester_id).single();
        if (!userRole) return;
        const action = req.action === "add" ? "add" : req.action === "edit" ? "edit" : "remove";
        const actionLabel = action === "add" ? "add a new person" : action === "edit" ? `edit ${payload.name}` : `remove ${payload.name}`;
        const subject = approved ? `Change Request Approved — Crew Board` : `Change Request Rejected — Crew Board`;
        const html = approved
          ? `<p>Hi ${userRole.full_name || "there"},</p><p>Your request to <strong>${actionLabel}</strong> on the Crew Board has been <strong>approved</strong> and applied.</p><p><a href="https://thomaskanata-crew-board.netlify.app/">View the board</a></p>`
          : `<p>Hi ${userRole.full_name || "there"},</p><p>Your request to <strong>${actionLabel}</strong> on the Crew Board has been <strong>rejected</strong>. Please contact your Admin for more information.</p>`;
        await sendEmail(userRole.email, subject, html);
      }

      async function approveRequest(req) {
        const payload = JSON.parse(req.payload);
        const data = {
          name: payload.name,
          position: payload.position || null,
          current_project: payload.current_project || null,
          project_end: payload.project_end || null,
          next_project: payload.next_project || null,
          vacation_start: payload.vacation_start || null,
          vacation_end: payload.vacation_end || null,
          comments: payload.comments || null,
        };
        let error;
        if (req.action === "add") {
          ({ error } = await sb.from("roster").insert(data));
        } else if (req.action === "edit") {
          if (!req.roster_id) { notify("Approve failed — no roster ID on this request", "error"); return; }
          ({ error } = await sb.from("roster").update(data).eq("id", req.roster_id));
        } else if (req.action === "remove") {
          if (!req.roster_id) { notify("Approve failed — no roster ID on this request", "error"); return; }
          ({ error } = await sb.from("roster").delete().eq("id", req.roster_id));
        }
        if (error) { notify("Approve failed: " + error.message, "error"); return; }
        await sb.from("requests").update({ status: "approved" }).eq("id", req.id);
        await notifyRequestResult(req, true);
        notify("Request approved"); load();
      }

      async function rejectRequest(id, req) {
        await sb.from("requests").update({ status: "rejected" }).eq("id", id);
        if (req) await notifyRequestResult(req, false);
        notify("Request rejected"); load();
      }

      async function signOut() {
        await sb.auth.signOut();
        window.location.reload();
      }

      return (
        <div style={{
          fontFamily: "'Inter', system-ui, sans-serif",
          background: "#F7F4EC", backgroundImage: "linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px)", backgroundSize: "28px 28px", color: "#1B2A33", minHeight: "100vh", padding: "24px 16px 80px",
        }}>
          <div style={{ maxWidth: 1080, margin: "0 auto" }}>

            {/* Header */}
            <div className="board-header">
              <div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "#6B6354", marginBottom: 4 }}>
                  REGISTER — CREW DEPLOYMENT
                </div>
                <h1 style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 26, letterSpacing: "0.02em", margin: 0, textTransform: "uppercase" }}>
                  Crew Board
                </h1>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#1B2A33" }}>{fullName || user.email}</div>
                  <div style={{ fontSize: 11, fontFamily: "'JetBrains Mono', monospace", color: isOwner ? "#A4621A" : isAdmin ? "#3E6F5C" : "#1F4E78", fontWeight: 600, marginTop: 2 }}>{isOwner ? "OWNER" : isAdmin ? "ADMIN" : "MEMBER"}</div>
                </div>
                <button className="cb-btn-ghost" style={{ fontSize: 12, padding: "8px 12px" }} onClick={signOut}>Sign out</button>
                {isAdmin && <button className="cb-btn-ghost" style={{ fontSize: 12, padding: "8px 12px" }} onClick={() => setShowUsers(!showUsers)}>
                  {showUsers ? "Hide users" : "Manage users"}
                </button>}
                {isEditor && <button className="cb-btn" onClick={() => setEditing({})}>+ Add</button>}
                {!isEditor && <button className="cb-btn" onClick={() => setEditing({})}>+ Request</button>}
              </div>
            </div>

            {/* Pending users (admin only) */}
            {isAdmin && pendingUsers.length > 0 && (
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 16, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 10 }}>
                  Access Requests
                  <span style={{ background: "#1F4E78", color: "#fff", borderRadius: 99, fontSize: 11, fontFamily: "'Inter', sans-serif", padding: "2px 8px" }}>
                    {pendingUsers.length}
                  </span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {pendingUsers.map(u => (
                    <div key={u.user_id} style={{
                      background: "#FFFEFA", border: "1px solid #D8D2BF",
                      borderLeft: "4px solid #2E6394", borderRadius: 3, padding: "12px 16px",
                      display: "flex", flexWrap: "wrap", alignItems: "center", justifyContent: "space-between", gap: 10,
                    }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{u.email}</div>
                        <div style={{ fontSize: 12, color: "#8A8270", marginTop: 2, fontFamily: "'JetBrains Mono', monospace" }}>Requesting access</div>
                      </div>
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button className="cb-btn-approve" onClick={() => approveUser(u, "member")}>Approve as Member</button>
                        {isOwner && (
                          <button className="cb-btn" style={{ background: "#1F4E78", borderColor: "#1F4E78", fontSize: 13, padding: "8px 14px" }}
                            onClick={() => approveUser(u, "admin")}>Approve as Admin</button>
                        )}
                        <button className="cb-btn-danger" style={{ padding: "8px 14px", fontSize: 13 }} onClick={() => rejectUser(u)}>Reject</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Pending requests (admin only) */}
            {isAdmin && <RequestsPanel requests={requests} roster={roster} onApprove={approveRequest} onReject={rejectRequest} />}

            {/* Users management panel */}
            {isAdmin && showUsers && (
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 600, fontSize: 16, textTransform: "uppercase", marginBottom: 10 }}>
                  All Users
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {allUsers.filter(u => isOwner || (!u.role?.startsWith("hidden_") && u.role !== "owner")).map(u => (
                    <div key={u.user_id} style={{
                      background: "#FFFEFA", border: "1px solid #D8D2BF", borderRadius: 3,
                      padding: "12px 16px", display: "flex", flexWrap: "wrap", alignItems: "center", justifyContent: "space-between", gap: 10,
                    }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{u.full_name || u.email}</div>
                        <div style={{ fontSize: 12, color: "#8A8270", marginTop: 2 }}>{u.email}</div>
                        <div style={{ fontSize: 11, marginTop: 3, fontFamily: "'JetBrains Mono', monospace",
                          color: u.status === "approved" ? "#3E6F5C" : u.status === "rejected" ? "#9A3C3C" : "#A4621A" }}>
                          {u.role?.toUpperCase()} — {u.status?.toUpperCase()}
                        </div>
                      </div>
                      {u.user_id === user.id && (
                        <div style={{ fontSize: 11, color: "#8A8270", fontFamily: "'JetBrains Mono', monospace" }}>YOU</div>
                      )}
                      {u.user_id !== user.id && u.role !== "owner" && (
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {u.status !== "approved" && (
                            <button className="cb-btn-approve" style={{ fontSize: 12, padding: "7px 12px" }}
                              onClick={() => changeUserStatus(u, "approved", u.role || "member")}>Approve</button>
                          )}
                          {u.status === "approved" && u.role !== "admin" && isOwner && (
                            <button className="cb-btn" style={{ fontSize: 12, padding: "7px 12px", background: "#1F4E78", borderColor: "#1F4E78" }}
                              onClick={() => changeUserStatus(u, "approved", "admin")}>Make Admin</button>
                          )}
                          {u.status === "approved" && u.role === "admin" && isOwner && (
                            <button className="cb-btn-ghost" style={{ fontSize: 12, padding: "7px 12px" }}
                              onClick={() => changeUserStatus(u, "approved", "member")}>Demote to Member</button>
                          )}
                          {u.status !== "rejected" && (
                            <button className="cb-btn-danger" style={{ fontSize: 12, padding: "7px 12px" }}
                              onClick={() => changeUserStatus(u, "rejected", u.role)}>Revoke access</button>
                          )}
                          {isOwner && (
                            <button className="cb-btn-ghost" style={{ fontSize: 12, padding: "7px 12px" }}
                              onClick={() => changeUserStatus(u, u.status, u.role === "hidden_member" ? "member" : "hidden_" + u.role)}>
                              {u.role?.startsWith("hidden_") ? "Unhide" : "Hide"}
                            </button>
                          )}
                        </div>
                      )}
                      {u.user_id !== user.id && u.role === "owner" && (
                        <div style={{ fontSize: 11, color: "#A4621A", fontFamily: "'JetBrains Mono', monospace" }}>OWNER — PROTECTED</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Stat counters */}
            <div className="stat-grid">
              {[
                { key: "active", label: "On project" },
                { key: "transitioning", label: "Wrapping up" },
                { key: "available", label: "Available" },
                { key: "vacation", label: "On vacation" },
              ].map(s => {
                const meta = STATUS_META[s.key];
                const isActive = filter === s.key;
                return (
                  <button key={s.key} onClick={() => setFilter(isActive ? "all" : s.key)} style={{
                    textAlign: "left", cursor: "pointer",
                    background: isActive ? meta.bg : "#FFFEFA",
                    border: `1px solid ${isActive ? meta.border : "#D8D2BF"}`,
                    borderLeft: `4px solid ${meta.border}`, borderRadius: 3, padding: "12px 14px",
                  }}>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 26, fontWeight: 600, color: meta.color }}>
                      {String(counts[s.key]).padStart(2, "0")}
                    </div>
                    <div style={{ fontSize: 11, color: "#5A5444", marginTop: 2 }}>{s.label}</div>
                  </button>
                );
              })}
            </div>

            {/* Position filter */}
            {positions.length > 0 && (
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "#8A8270", marginBottom: 7 }}>
                  FILTER BY POSITION
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  <button
                    onClick={() => setPositionFilter("all")}
                    style={{
                      fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: 500,
                      padding: "5px 12px", borderRadius: 99, cursor: "pointer",
                      background: positionFilter === "all" ? "#1B2A33" : "#FFFEFA",
                      color: positionFilter === "all" ? "#F7F4EC" : "#5A5444",
                      border: positionFilter === "all" ? "1px solid #1B2A33" : "1px solid #C9C2AC",
                    }}>
                    All
                  </button>
                  {positions.map(pos => (
                    <button
                      key={pos}

    function ResetPasswordScreen() {
      const [password, setPassword] = useState("");
      const [confirm, setConfirm] = useState("");
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);

      async function handleReset() {

        if (error) { setMessage({ text: error.message, type: "error" }); setLoading(false); }
        else {
          setMessage({ text: "Password updated! Signing you in…", type: "ok" });
          setLoading(false);
          setTimeout(() => window.location.reload(), 1200);
        }
      }

      return (
        <div style={{
          minHeight: "100vh", background: "#F7F4EC", backgroundImage: "linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px)", backgroundSize: "28px 28px", display: "flex", alignItems: "center", justifyContent: "center", padding: 24,

              <PasswordField label="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)}

        function App() {
      const [session, setSession] = useState(null);
      const [role, setRole] = useState(null);
      const [checking, setChecking] = useState(true);
      const [isResetting, setIsResetting] = useState(false);
      const [authView, setAuthView] = useState("login");

      useEffect(() => {
        // Detect password recovery event from reset email link
        sb.auth.onAuthStateChange((event, session) => {
          if (event === "PASSWORD_RECOVERY") {
            setIsResetting(true);
            setChecking(false);
            return;
          }
          setSession(session);
          if (session) fetchRole(session.user.id);
          else { setRole(null); setChecking(false); }
        });

        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) fetchRole(session.user.id);
          else setChecking(false);
        });
      }, []);

      async function fetchRole(uid) {
        const { data } = await sb.from("user_roles").select("role, status").eq("user_id", uid).single();
        if (!data) { setRole("pending"); }
        else if (data.status === "pending") { setRole("pending"); }
        else if (data.status === "rejected") { setRole("rejected"); }
        else if (data.role?.startsWith("hidden_")) { setRole(data.role.replace("hidden_", "")); }
        else { setRole(data.role || "member"); }
        setChecking(false);
      }

      if (checking) return (
        <div style={{ minHeight: "100vh", background: "#F7F4EC", backgroundImage: "linear-gradient(#E3DFD1 1px, transparent 1px), linear-gradient(90deg, #E3DFD1 1px, transparent 1px)", backgroundSize: "28px 28px", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#8A8270" }}>
          Loading…
        </div>
      );

      if (isResetting) return <ResetPasswordScreen />;
      if (!session) {
        if (authView === "signup") return <SignupScreen onSwitchToLogin={() => setAuthView("login")} />;
        return <LoginScreen onSwitchToSignup={() => setAuthView("signup")} />;
      }
      if (role === "pending") return <PendingScreen email={session.user.email} />;
      if (role === "rejected") return <RejectedScreen email={session.user.email} />;
      return <CrewBoard user={session.user} role={role} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <canvas id="bg-canvas"></canvas>
  <script>
  (function(){
    const C = document.getElementById('bg-canvas');
    const ctx = C.getContext('2d');
    let W, H, t = 0;

    // Worker positions — initialized once, updated smoothly
    const workerData = [];
    const craneState = { jib1: -0.15, jib2: 0.12, jib1Dir: 1, jib2Dir: -1 };
    const truckState = { x: 0, dir: 1 };

    function resize() {
      W = C.width = window.innerWidth;
      H = C.height = window.innerHeight;
      truckState.x = truckState.x || W * 0.12;
      if (workerData.length === 0) initWorkers();
    }

    function initWorkers() {
      workerData.length = 0;
      const slots = [
        0.10, 0.13, 0.17, 0.22, 0.26,
        0.42, 0.45, 0.49,
        0.63, 0.66, 0.70,
        0.80, 0.84, 0.88
      ];
      slots.forEach((xf, i) => {
        workerData.push({
          xBase: xf,
          x: xf * (typeof W !== 'undefined' ? W : 1200),
          speed: (Math.random() - 0.5) * 0.18,
          dir: Math.random() > 0.5 ? 1 : -1,
          phase: Math.random() * Math.PI * 2,
          hat: ['#D97706','#EA580C','#FBBF24','#FFFFFF','#DC2626'][i % 5],
          vest: i % 3 === 0,
          task: i % 5,
        });
      });
    }

    // ── Pencil sketch helpers ────────────────────────────────────────
    function sketchLine(x1, y1, x2, y2, alpha, width) {
      ctx.save();
      ctx.globalAlpha = alpha || 0.55;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = width || 0.8;
      ctx.lineCap = 'round';
      // Slight hand-drawn wobble using fixed offsets
      const mx = (x1+x2)/2 + (Math.sin(x1*0.1+y1*0.07)*0.8);
      const my = (y1+y2)/2 + (Math.cos(x2*0.09+y2*0.11)*0.6);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(mx, my, x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function sketchRect(x, y, w, h, alpha, fill) {
      ctx.save();
      ctx.globalAlpha = alpha || 0.55;
      if (fill) { ctx.fillStyle = fill; ctx.fillRect(x,y,w,h); }
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 0.9;
      ctx.lineCap = 'round';
      ctx.strokeRect(x + 0.3, y + 0.2, w - 0.3, h - 0.2);
      ctx.restore();
    }

    function hatch(x, y, w, h, spacing, angle, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha || 0.12;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let i = -h; i < w + h; i += spacing) {
        if (angle === 'fwd') {
          ctx.moveTo(x + i, y + h);
          ctx.lineTo(x + i + h, y);
        } else {
          ctx.moveTo(x + i, y);
          ctx.lineTo(x + i - h, y + h);
        }
      }
      ctx.stroke();
      ctx.restore();
    }

    // ── Sky & ground ─────────────────────────────────────────────────
    function drawSky() {
      // Sunny day gradient — warm cream to pale blue
      const g = ctx.createLinearGradient(0, 0, 0, H * 0.55);
      g.addColorStop(0, '#C8DCEF');
      g.addColorStop(0.35, '#D8E8F4');
      g.addColorStop(0.7, '#E8EFE2');
      g.addColorStop(1, '#EDE8DC');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // Sun — pencil circle top right
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = '#B8860B';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(W*0.88, H*0.08, 28, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(W*0.88, H*0.08, 22, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,220,100,0.15)'; ctx.fill();
      // Sun rays
      for (let a = 0; a < Math.PI*2; a += Math.PI/6) {
        ctx.beginPath();
        ctx.moveTo(W*0.88 + Math.cos(a)*30, H*0.08 + Math.sin(a)*30);
        ctx.lineTo(W*0.88 + Math.cos(a)*42, H*0.08 + Math.sin(a)*42);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMountains() {
      // Kitimat mountains — pencil sketch silhouette
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 1;
      ctx.fillStyle = 'rgba(180,190,200,0.3)';

      const gY = H * 0.58;
      // Left mountain range
      ctx.beginPath();
      ctx.moveTo(0, gY);
      ctx.lineTo(W*0.05, gY - H*0.22);
      ctx.lineTo(W*0.12, gY - H*0.30);
      ctx.lineTo(W*0.18, gY - H*0.18);
      ctx.lineTo(W*0.25, gY - H*0.27);
      ctx.lineTo(W*0.32, gY - H*0.12);
      ctx.lineTo(W*0.38, gY);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Right mountain range
      ctx.beginPath();
      ctx.moveTo(W*0.60, gY);
      ctx.lineTo(W*0.65, gY - H*0.15);
      ctx.lineTo(W*0.72, gY - H*0.28);
      ctx.lineTo(W*0.79, gY - H*0.20);
      ctx.lineTo(W*0.86, gY - H*0.32);
      ctx.lineTo(W*0.93, gY - H*0.19);
      ctx.lineTo(W, gY - H*0.12);
      ctx.lineTo(W, gY);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Snow caps — light hatching
      ctx.globalAlpha = 0.1;
      hatch(W*0.09, gY-H*0.30, W*0.06, H*0.10, 4, 'fwd', 0.15);
      hatch(W*0.83, gY-H*0.32, W*0.06, H*0.10, 4, 'fwd', 0.15);
      ctx.restore();
    }

    function drawGround() {
      const gY = ground();
      // Ground fill — light dirt/gravel
      const g = ctx.createLinearGradient(0, gY, 0, H);
      g.addColorStop(0, '#C8B89A');
      g.addColorStop(0.3, '#BEA882');
      g.addColorStop(1, '#B09870');
      ctx.fillStyle = g;
      ctx.fillRect(0, gY, W, H - gY);

      // Ground texture — sparse hatch
      hatch(0, gY, W, H-gY, 14, 'fwd', 0.07);

      // Ground line
      sketchLine(0, gY, W, gY, 0.5, 1.2);

      // Road/haul route — double line
      const ry = gY + (H-gY)*0.3;
      sketchLine(0, ry, W, ry, 0.3, 1);
      sketchLine(0, ry+10, W, ry+10, 0.2, 0.7);
      // Road label
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.font = '9px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('HAUL ROAD', W*0.44, ry + 8);
      ctx.restore();

      // Laydown area — hatched rectangle
      const lx = W*0.55, lw = W*0.2, ly = gY+4, lh = (H-gY)*0.28;
      sketchRect(lx, ly, lw, lh, 0.25, 'rgba(180,160,120,0.15)');
      hatch(lx, ly, lw, lh, 10, 'back', 0.1);
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.font = 'bold 9px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('▣ LAYDOWN AREA', lx+6, ly+14);
      ctx.restore();

      // Gravel texture dots
      ctx.save();
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = '#2C2416';
      for (let i = 0; i < 180; i++) {
        const gx = (Math.sin(i*17.3)*0.5+0.5)*W;
        const gy2 = gY + (Math.sin(i*9.7)*0.5+0.5)*(H-gY);
        ctx.beginPath();
        ctx.arc(gx, gy2, 0.8 + (i%3)*0.4, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    function ground() { return H * 0.60; }

    // ── LNG tanks ────────────────────────────────────────────────────
    function drawLNGTanks() {
      const gY = ground();
      const tanks = [
        { x: W*0.36, r: W*0.055, h: H*0.22 },
        { x: W*0.50, r: W*0.055, h: H*0.22 },
      ];
      tanks.forEach(({ x, r, h }) => {
        const top = gY - h;
        // Tank body
        ctx.save();
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = 'rgba(220,215,205,0.6)';
        ctx.strokeStyle = '#2C2416';
        ctx.lineWidth = 1;
        // Cylinder sides
        ctx.beginPath();
        ctx.moveTo(x-r, top+r*0.3);
        ctx.lineTo(x-r, gY);
        ctx.lineTo(x+r, gY);
        ctx.lineTo(x+r, top+r*0.3);
        ctx.fill();
        ctx.stroke();
        // Ellipse top
        ctx.beginPath();
        ctx.ellipse(x, top+r*0.3, r, r*0.25, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(235,228,215,0.7)';
        ctx.fill(); ctx.stroke();
        // Dome
        ctx.beginPath();
        ctx.arc(x, top+r*0.1, r*0.92, Math.PI, 0);
        ctx.fill(); ctx.stroke();

        // Horizontal bands (insulation)
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = 0.25;
        for (let b = 1; b < 5; b++) {
          const by = top + r*0.3 + (gY - top - r*0.3) * (b/5);
          ctx.beginPath();
          ctx.moveTo(x-r, by);
          ctx.lineTo(x+r, by);
          ctx.stroke();
        }
        // Vertical seam
        ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, gY); ctx.stroke();
        ctx.globalAlpha = 1;

        // Insulation hatching
        hatch(x-r+2, top+r*0.3, r*2-4, gY-top-r*0.3, 8, 'fwd', 0.06);

        // Foundation
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = 'rgba(180,165,140,0.5)';
        ctx.fillRect(x-r-4, gY, r*2+8, 8);
        ctx.strokeRect(x-r-4, gY, r*2+8, 8);
        ctx.restore();

        // Label
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.font = '8px "JetBrains Mono", monospace';
        ctx.fillStyle = '#2C2416';
        ctx.textAlign = 'center';
        ctx.fillText('LNG', x, gY-4);
        ctx.fillText('TANK', x, gY+6);
        ctx.textAlign = 'left';
        ctx.restore();

        // Connecting pipes at bottom
        sketchLine(x-r, gY-8, x-r-W*0.03, gY-8, 0.3, 3);
        sketchLine(x+r, gY-8, x+r+W*0.03, gY-8, 0.3, 3);
      });
    }

    // ── Pipe racks ───────────────────────────────────────────────────
    function drawPipeRacks() {
      const gY = ground();
      // Main pipe rack running across site
      const rackY = gY - H*0.15;
      const rackX1 = W*0.05, rackX2 = W*0.55;
      const colCount = 8;
      const colSpan = (rackX2 - rackX1) / colCount;

      // Columns
      for (let i = 0; i <= colCount; i++) {
        const cx = rackX1 + i * colSpan;
        sketchLine(cx, gY, cx, rackY, 0.5, 1.5);
        // Base plate
        sketchLine(cx-6, gY, cx+6, gY, 0.4, 1.5);
      }
      // Top beam
      sketchLine(rackX1, rackY, rackX2, rackY, 0.55, 1.5);
      sketchLine(rackX1, rackY+5, rackX2, rackY+5, 0.3, 0.8);

      // Pipes on rack
      const pipeColors = [
        'rgba(140,130,120,0.5)',
        'rgba(120,140,130,0.4)',
        'rgba(150,130,110,0.45)',
        'rgba(130,145,135,0.4)',
        'rgba(110,120,115,0.35)',
      ];
      for (let p = 0; p < 5; p++) {
        const py = rackY + 8 + p * 6;
        ctx.save();
        ctx.globalAlpha = 0.6;
        ctx.strokeStyle = '#2C2416';
        ctx.fillStyle = pipeColors[p];
        ctx.lineWidth = p === 0 ? 4 : p === 1 ? 5 : 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(rackX1, py);
        ctx.lineTo(rackX2, py);
        ctx.stroke();
        // Pipe end caps at columns
        for (let i = 0; i <= colCount; i++) {
          const cx = rackX1 + i * colSpan;
          ctx.beginPath();
          ctx.arc(cx, py, ctx.lineWidth/2 + 1, 0, Math.PI*2);
          ctx.fillStyle = '#8A8070';
          ctx.fill();
        }
        ctx.restore();
      }

      // Rack label
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('PIPE RACK — 36" CRYOGENIC SERVICE', rackX1, rackY - 5);
      ctx.restore();

      // Second smaller rack right side
      const rx2 = W*0.78, rx2end = W*0.97, ry2 = gY - H*0.10;
      for (let i = 0; i <= 4; i++) {
        const cx = rx2 + i*(rx2end-rx2)/4;
        sketchLine(cx, gY, cx, ry2, 0.4, 1.2);
      }
      sketchLine(rx2, ry2, rx2end, ry2, 0.45, 1.2);
      for (let p = 0; p < 3; p++) {
        const py = ry2 + 6 + p*5;
        ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle='#2C2416';
        ctx.lineWidth = 3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(rx2, py); ctx.lineTo(rx2end, py); ctx.stroke();
        ctx.restore();
      }
    }

    // ── Flare stack ─────────────────────────────────────────────────
    function drawFlareStack(t) {
      const gY = ground();
      const fx = W * 0.92;
      const fh = H * 0.48;
      const top = gY - fh;

      // Guy wires
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 0.6;
      ctx.setLineDash([4, 3]);
      sketchLine(fx, top, fx-W*0.06, gY, 0.2, 0.6);
      sketchLine(fx, top, fx+W*0.04, gY, 0.2, 0.6);
      sketchLine(fx, top+fh*0.4, fx-W*0.04, gY, 0.15, 0.5);
      ctx.setLineDash([]);
      ctx.restore();

      // Stack
      sketchLine(fx, gY, fx, top, 0.55, 3);
      sketchLine(fx-2, gY, fx-2, top+fh*0.05, 0.2, 1);
      // Tip
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(fx-4, top+10);
      ctx.lineTo(fx, top);
      ctx.lineTo(fx+4, top+10);
      ctx.stroke();
      ctx.restore();

      // Flame — very subtle, no flicker — smooth sine
      const flameH = 10 + Math.sin(t * 0.04) * 3;
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#F59E0B';
      ctx.beginPath();
      ctx.moveTo(fx-5, top);
      ctx.quadraticCurveTo(fx-2, top - flameH*0.6, fx, top - flameH);
      ctx.quadraticCurveTo(fx+2, top - flameH*0.6, fx+5, top);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#EF4444';
      ctx.beginPath();
      ctx.ellipse(fx, top - flameH*0.3, 8, flameH*0.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Label
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('FLARE', fx+5, top+20);
      ctx.fillText('STACK', fx+5, top+30);
      ctx.restore();
    }

    // ── Heavy lift crane ────────────────────────────────────────────
    function drawCrane(cx, cJibAngle, side) {
      const gY = ground();
      const towerH = H * 0.52;
      const jibLen = W * 0.17;
      const tx = cx;
      const ty = gY - towerH;

      // Mast — sketchy lines
      sketchLine(tx-4, gY, tx-4, ty, 0.5, 1);
      sketchLine(tx+4, gY, tx+4, ty, 0.5, 1);
      // Lattice
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 0.7;
      for (let y = gY; y > ty; y -= 24) {
        ctx.beginPath(); ctx.moveTo(tx-4, y); ctx.lineTo(tx+4, y-24); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(tx+4, y); ctx.lineTo(tx-4, y-24); ctx.stroke();
      }
      ctx.restore();

      // Operator cab
      sketchRect(tx-8, ty-16, 16, 18, 0.45, 'rgba(200,190,170,0.4)');
      hatch(tx-8, ty-16, 16, 18, 4, 'fwd', 0.08);

      // Jib — slowly rotating
      const jibEndX = tx + Math.cos(cJibAngle) * jibLen;
      const jibEndY = ty + Math.sin(cJibAngle) * jibLen * 0.12;
      sketchLine(tx, ty-8, jibEndX, jibEndY, 0.5, 1.8);
      // Jib lattice detail
      const jibMX = tx + Math.cos(cJibAngle)*jibLen*0.5;
      const jibMY = ty + Math.sin(cJibAngle)*jibLen*0.06;
      sketchLine(tx, ty-8, jibMX, jibMY - H*0.03, 0.2, 0.7);
      sketchLine(jibMX, jibMY - H*0.03, jibEndX, jibEndY, 0.2, 0.7);

      // Counter jib
      const cjX = tx - Math.cos(cJibAngle)*jibLen*0.3;
      const cjY = ty - Math.sin(cJibAngle)*jibLen*0.04;
      sketchLine(tx, ty-8, cjX, cjY, 0.4, 1.4);
      // Counter weight
      sketchRect(cjX-10, cjY-8, 20, 10, 0.45, 'rgba(150,140,125,0.5)');

      // Hoist rope — no jitter, smooth
      const ropeDropY = jibEndY + H*0.06 + Math.sin(t*0.012 + side*1.8) * H*0.045;
      sketchLine(jibEndX, jibEndY, jibEndX, ropeDropY, 0.3, 0.6);

      // Hook block
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(jibEndX, ropeDropY, 3, 0, Math.PI*2); ctx.stroke();
      ctx.restore();

      // Load — module/beam
      sketchRect(jibEndX-18, ropeDropY+4, 36, 12, 0.45, 'rgba(170,160,140,0.4)');
      hatch(jibEndX-18, ropeDropY+4, 36, 12, 5, 'back', 0.12);

      // Base/slewing ring
      sketchRect(tx-14, gY-10, 28, 10, 0.5, 'rgba(180,170,150,0.4)');

      // Crane label
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.textAlign = 'center';
      ctx.fillText(side === 0 ? 'CC-1400' : 'LTM-1750', tx, gY - 14);
      ctx.textAlign = 'left';
      ctx.restore();
    }

    // ── Module / prefab structure ────────────────────────────────────
    function drawModules() {
      const gY = ground();
      // Large module under construction
      const mx = W*0.08, my = gY - H*0.30, mw = W*0.14, mh = H*0.30;
      sketchRect(mx, my, mw, mh, 0.45, 'rgba(200,195,183,0.3)');
      // Floor levels
      for (let f = 1; f < 4; f++) {
        sketchLine(mx, my + mh*(f/4), mx+mw, my + mh*(f/4), 0.3, 0.8);
      }
      // Vertical columns
      for (let c = 0; c < 4; c++) {
        sketchLine(mx + mw*(c/3), my, mx + mw*(c/3), gY, 0.4, 1.2);
      }
      hatch(mx, my, mw, mh, 16, 'back', 0.05);
      // Label
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('MODULE C-4', mx+4, my-4);
      ctx.restore();

      // Smaller completed module
      const mx2 = W*0.76, my2 = gY - H*0.18, mw2 = W*0.10, mh2 = H*0.18;
      sketchRect(mx2, my2, mw2, mh2, 0.4, 'rgba(195,190,178,0.25)');
      for (let f = 1; f < 3; f++) {
        sketchLine(mx2, my2+mh2*(f/3), mx2+mw2, my2+mh2*(f/3), 0.25, 0.7);
      }
      sketchLine(mx2+mw2/3, my2, mx2+mw2/3, gY, 0.35, 1);
      sketchLine(mx2+mw2*2/3, my2, mx2+mw2*2/3, gY, 0.35, 1);
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';
      ctx.fillText('MODULE A-2', mx2+4, my2-4);
      ctx.restore();
    }

    // ── Workers — pencil sketch style ───────────────────────────────
    function drawWorkers(t) {
      const gY = ground();
      workerData.forEach((w, i) => {
        // Smooth movement
        w.x += w.speed * w.dir;
        const maxX = W * 0.95, minX = W * 0.03;
        if (w.x > maxX || w.x < minX) w.dir *= -1;

        const bob = Math.sin(t * 0.055 + w.phase) * 1;
        const wx = w.x;
        const wy = gY + bob - 1;

        ctx.save();
        ctx.globalAlpha = 0.6;

        // Shadow
        ctx.globalAlpha = 0.08;
        ctx.fillStyle = '#2C2416';
        ctx.beginPath(); ctx.ellipse(wx, wy+1, 5, 2, 0, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 0.6;

        // Legs — walking cycle
        const legSwing = Math.sin(t * 0.11 + w.phase) * 3;
        ctx.strokeStyle = '#2C2416'; ctx.lineWidth = 1; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(wx, wy-4); ctx.lineTo(wx-3+legSwing, wy+5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx, wy-4); ctx.lineTo(wx+3-legSwing, wy+5); ctx.stroke();

        // Body
        ctx.beginPath(); ctx.moveTo(wx, wy-12); ctx.lineTo(wx, wy-4); ctx.stroke();

        // Arms
        const armSwing = Math.sin(t * 0.11 + w.phase + Math.PI) * 3;
        ctx.beginPath(); ctx.moveTo(wx, wy-10); ctx.lineTo(wx-4-armSwing, wy-5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx, wy-10); ctx.lineTo(wx+4+armSwing, wy-5); ctx.stroke();

        // Head
        ctx.beginPath(); ctx.arc(wx, wy-14, 3.5, 0, Math.PI*2);
        ctx.fillStyle = '#E8D4B8'; ctx.fill(); ctx.stroke();

        // Hard hat — colour coded by role
        ctx.fillStyle = w.hat;
        ctx.globalAlpha = 0.75;
        ctx.beginPath();
        ctx.ellipse(wx, wy-16, 4.5, 2, 0, Math.PI, 0);
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.fillRect(wx-5, wy-17, 10, 2);

        // Task prop
        ctx.globalAlpha = 0.5;
        ctx.lineWidth = 0.8;
        if (w.task === 0) {
          // Carrying pipe
          ctx.beginPath(); ctx.moveTo(wx-8, wy-9); ctx.lineTo(wx+10, wy-9); ctx.stroke();
        } else if (w.task === 1) {
          // Radio/clipboard
          ctx.strokeRect(wx+4, wy-10, 5, 4);
        } else if (w.task === 2) {
          // Tool bag at feet
          sketchRect(wx+3, wy+2, 5, 4, 0.3, null);
        } else if (w.task === 3) {
          // Pointing gesture
          ctx.beginPath(); ctx.moveTo(wx, wy-9); ctx.lineTo(wx+9, wy-13); ctx.stroke();
        } else {
          // Insulation roll
          ctx.beginPath(); ctx.arc(wx+6, wy-6, 3, 0, Math.PI*2); ctx.stroke();
        }

        // Hi-vis vest lines
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#FBBF24';
        ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(wx-2, wy-10); ctx.lineTo(wx-2, wy-5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wx+2, wy-10); ctx.lineTo(wx+2, wy-5); ctx.stroke();

        ctx.restore();
      });
    }

    // ── Vehicles ─────────────────────────────────────────────────────
    function drawTruck(t) {
      const gY = ground();
      // Smooth back-and-forth on haul road
      const ry = gY + (H-gY)*0.3;
      truckState.x += 0.5 * truckState.dir;
      if (truckState.x > W*0.80) truckState.dir = -1;
      if (truckState.x < W*0.05) truckState.dir = 1;

      const tx = truckState.x;
      const flip = truckState.dir;

      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.translate(tx, ry - 12);
      ctx.scale(flip, 1);

      // Shadow
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#2C2416';
      ctx.beginPath(); ctx.ellipse(0, 14, 28, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 0.5;

      // Wheels — 2 axles
      ctx.strokeStyle = '#2C2416'; ctx.lineWidth = 1;
      [-20, 20].forEach(wx2 => {
        ctx.beginPath(); ctx.arc(wx2, 10, 7, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(wx2, 10, 3, 0, Math.PI*2); ctx.stroke();
      });
      // Body/chassis
      ctx.fillStyle = 'rgba(180,165,140,0.5)';
      ctx.strokeStyle = '#2C2416'; ctx.lineWidth = 0.9;
      ctx.fillRect(-28, -2, 56, 12); ctx.strokeRect(-28, -2, 56, 12);
      // Cab
      ctx.fillRect(20, -14, 16, 14); ctx.strokeRect(20, -14, 16, 14);
      // Window
      ctx.fillStyle = 'rgba(180,210,230,0.3)';
      ctx.fillRect(23, -11, 9, 7); ctx.strokeRect(23, -11, 9, 7);
      // Bed
      ctx.fillStyle = 'rgba(160,148,128,0.4)';
      ctx.fillRect(-26, -12, 48, 10); ctx.strokeRect(-26, -12, 48, 10);
      hatch(-26, -12, 48, 10, 8, 'fwd', 0.15);
      // Exhaust
      ctx.strokeStyle = '#2C2416'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(22, -14); ctx.lineTo(22, -20); ctx.stroke();

      ctx.restore();
    }

    // ── Scaffold towers ──────────────────────────────────────────────
    function drawScaffolds() {
      const gY = ground();
      const scaffolds = [
        { x: W*0.08, h: H*0.30, w: W*0.04, levels: 4 },
        { x: W*0.21, h: H*0.22, w: W*0.035, levels: 3 },
        { x: W*0.82, h: H*0.20, w: W*0.04, levels: 3 },
      ];
      scaffolds.forEach(({ x, h, w, levels }) => {
        const top = gY - h;
        const lh = h / levels;
        // Verticals
        sketchLine(x, gY, x, top, 0.4, 1);
        sketchLine(x+w, gY, x+w, top, 0.4, 1);
        sketchLine(x+w*0.5, gY, x+w*0.5, top, 0.25, 0.7);
        // Horizontals + diagonals
        for (let l = 0; l <= levels; l++) {
          const ly = gY - lh*l;
          sketchLine(x, ly, x+w, ly, 0.35, 0.9);
          if (l < levels) {
            sketchLine(x, ly, x+w*0.5, ly-lh, 0.15, 0.5);
            sketchLine(x+w, ly, x+w*0.5, ly-lh, 0.15, 0.5);
          }
        }
        // Platform planks
        for (let l = 1; l <= levels; l++) {
          const py = gY - lh*l;
          sketchRect(x+1, py-3, w-2, 4, 0.35, 'rgba(160,140,100,0.3)');
        }
        // Access ladder
        ctx.save();
        ctx.globalAlpha = 0.2;
        ctx.strokeStyle = '#2C2416'; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(x+w+4, gY); ctx.lineTo(x+w+4, top); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+w+8, gY); ctx.lineTo(x+w+8, top); ctx.stroke();
        for (let r = 0; r < levels*4; r++) {
          const ry2 = gY - r*(h/(levels*4));
          ctx.beginPath(); ctx.moveTo(x+w+4, ry2); ctx.lineTo(x+w+8, ry2); ctx.stroke();
        }
        ctx.restore();
      });
    }

    // ── Title block (drawing border) ─────────────────────────────────

      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#2C2416';
      ctx.lineWidth = 1;

      ctx.strokeRect(6, 6, W-12, H-12);
      ctx.strokeRect(10, 10, W-20, H-20);

      ctx.strokeRect(tbx, tby, tbw, tbh);

      ctx.globalAlpha = 0.35;
      ctx.font = 'bold 9px "JetBrains Mono", monospace';
      ctx.fillStyle = '#2C2416';

      ctx.font = '8px "JetBrains Mono", monospace';

      ctx.fillText('DWG NO: LNGC-SITE-001', tbx+5, tby+43);
      ctx.fillText('REV: A', tbx+108, tby+13);
      ctx.fillText('SCALE 1:500', tbx+108, tby+27);
      ctx.restore();
    }

    // ── Dimension annotations ─────────────────────────────────────────
    function drawAnnotations() {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = '#2C2416';
      ctx.fillStyle = '#2C2416';
      ctx.lineWidth = 0.6;
      ctx.font = '8px "JetBrains Mono", monospace';

      // North arrow
      const nx = W-30, ny = 60;
      ctx.beginPath(); ctx.moveTo(nx, ny+15); ctx.lineTo(nx, ny-15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(nx-6, ny-5); ctx.lineTo(nx, ny-15); ctx.lineTo(nx+6, ny-5); ctx.closePath();
      ctx.fill();
      ctx.fillText('N', nx-3, ny+25);

      // Scale bar
      const sbx = W-120, sby = H-65;
      ctx.strokeRect(sbx, sby, 60, 5);
      ctx.fillRect(sbx, sby, 30, 5);
      ctx.fillText('0    50m', sbx, sby+14);

      ctx.restore();
    }

    // ── Main render ──────────────────────────────────────────────────
    function render() {
      t++;

      // Smooth jib rotation — no sudden jumps
      craneState.jib1 += 0.0008 * craneState.jib1Dir;
      if (craneState.jib1 > 0.3 || craneState.jib1 < -0.3) craneState.jib1Dir *= -1;
      craneState.jib2 += 0.0006 * craneState.jib2Dir;
      if (craneState.jib2 > 0.25 || craneState.jib2 < -0.15) craneState.jib2Dir *= -1;

      ctx.clearRect(0, 0, W, H);

      drawSky();
      drawMountains();
      drawModules();
      drawPipeRacks();
      drawScaffolds();
      drawLNGTanks();
      drawFlareStack(t);
      drawCrane(W*0.25, craneState.jib1, 0);
      drawCrane(W*0.63, craneState.jib2, 1);
      drawGround();
      drawTruck(t);
      drawWorkers(t);
      drawAnnotations();
      drawTitleBlock();

      requestAnimationFrame(render);
    }

    resize();
    window.addEventListener('resize', () => { resize(); });
    render();
  })();
  </script>
</body>
</html>
